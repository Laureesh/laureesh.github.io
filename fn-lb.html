<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UEFN Leaderboard Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:   #FFD700;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
    --accent: #FFA500;
    --bg:     #0A0A0A;
    --card:   #111111;
    --border: #2A2000;
    --red:    #FF4C4C;
    --green:  #00E676;
    --text:   #FFF5E0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,165,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,165,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* Header */
  header { text-align: center; margin-bottom: 36px; }
  body.display-active header { display: none; }
  .logo-tag {
    display: inline-block;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 12px;
    margin-bottom: 12px;
    opacity: 0.9;
  }
  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(22px, 5vw, 38px);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 30px rgba(255,165,0,0.7), 0 0 60px rgba(255,100,0,0.3);
    letter-spacing: 2px;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    margin-top: 8px;
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
  }

  /* Form card */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    border-radius: 4px;
    padding: 22px;
    margin-bottom: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .form-title {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 130px auto;
    gap: 10px;
    align-items: end;
  }
  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    background: #0F0F0F;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(255,165,0,0.3); }
  input::placeholder { color: rgba(255,255,255,0.18); font-weight: 500; }

  /* Buttons */
  .btn {
    padding: 10px 18px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-add { background: var(--accent); color: #000; font-weight: 900; }
  .btn-add:hover { background: #FFD700; transform: translateY(-1px); }

  .btn-sm {
    padding: 5px 11px;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-edit   { background: rgba(0,207,255,0.1); color: var(--accent); border: 1px solid rgba(0,207,255,0.4); }
  .btn-edit:hover { background: var(--accent); color: #000; }
  .btn-del    { background: rgba(255,76,76,0.1); color: var(--red); border: 1px solid rgba(255,76,76,0.4); }
  .btn-del:hover  { background: var(--red); color: #fff; }
  .btn-save   { background: rgba(0,230,118,0.1); color: var(--green); border: 1px solid rgba(0,230,118,0.4); }
  .btn-save:hover { background: var(--green); color: #000; }
  .btn-cancel { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.12); }
  .btn-cancel:hover { background: rgba(255,255,255,0.1); }

  .btn-populate {
    background: rgba(255,215,0,0.1);
    color: var(--gold);
    border: 1px solid rgba(255,215,0,0.4);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    padding: 6px 14px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    font-weight: 700;
  }
  .btn-populate:hover { background: rgba(255,165,0,0.3); border-color: var(--accent); }

  .btn-reset {
    background: transparent;
    color: rgba(255,76,76,0.5);
    border: 1px solid rgba(255,76,76,0.25);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    padding: 6px 14px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  .btn-reset:hover { background: rgba(255,76,76,0.1); color: var(--red); border-color: var(--red); }

  .btn-remove-all {
    background: transparent;
    color: rgba(255,76,76,0.5);
    border: 1px solid rgba(255,76,76,0.25);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    padding: 6px 14px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  .btn-remove-all:hover { background: rgba(255,76,76,0.1); color: var(--red); border-color: var(--red); }

  /* Topbar */
  .lb-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .lb-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
  }
  .lb-count {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
  }

  /* Leaderboard */
  .lb-list { display: flex; flex-direction: column; gap: 6px; }

  .lb-empty {
    text-align: center;
    padding: 52px 20px;
    color: rgba(255,255,255,0.18);
    font-size: 13px;
    letter-spacing: 2px;
    border: 1px dashed var(--border);
    border-radius: 4px;
  }
  .lb-empty span { display: block; font-size: 28px; margin-bottom: 10px; opacity: 0.4; }

  .lb-row {
    display: grid;
    grid-template-columns: 50px 1fr 140px auto;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    border-radius: 3px;
    padding: 11px 14px;
    transition: border-color 0.2s, transform 0.15s;
    animation: slideIn 0.22s ease both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .lb-row:hover { border-color: rgba(255,165,0,0.4); transform: translateX(2px); }
  .lb-row.pos-1 { border-left-color: var(--gold);   background: linear-gradient(90deg,rgba(255,215,0,0.07),var(--card) 55%); }
  .lb-row.pos-2 { border-left-color: var(--silver); background: linear-gradient(90deg,rgba(192,192,192,0.05),var(--card) 55%); }
  .lb-row.pos-3 { border-left-color: var(--bronze); background: linear-gradient(90deg,rgba(205,127,50,0.06),var(--card) 55%); }
  .lb-row.editing { border-color: var(--accent) !important; background: #1A1000 !important; }

  .rank-badge {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    text-align: center;
  }
  .pos-1 .rank-badge { color: var(--gold);   font-size: 22px; text-shadow: 0 0 12px rgba(255,215,0,0.8); }
  .pos-2 .rank-badge { color: var(--silver); font-size: 20px; text-shadow: 0 0 10px rgba(192,192,192,0.6); }
  .pos-3 .rank-badge { color: var(--bronze); font-size: 18px; text-shadow: 0 0 10px rgba(205,127,50,0.6); }
  .lb-row:not(.pos-1):not(.pos-2):not(.pos-3) .rank-badge {
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    text-shadow: 0 0 6px rgba(255,255,255,0.2);
  }

  .player-name {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-score {
    font-family: 'Orbitron', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    text-align: right;
  }
  .pos-1 .player-score { color: var(--gold); }
  .pos-2 .player-score { color: var(--silver); }
  .pos-3 .player-score { color: var(--bronze); }

  .row-actions { display: flex; gap: 6px; justify-content: flex-end; }

  /* Inline edit inputs */
  .edit-name, .edit-score {
    background: #1A1000;
    border: 1px solid var(--accent);
    border-radius: 3px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 4px 8px;
    outline: none;
    width: 100%;
  }
  .edit-score { width: 90px; text-align: right; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 10px 22px;
    border-radius: 3px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }


  /* ── Tab Nav ── */
  .tab-nav {
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: fixed;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
  }
  .tab-btn {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 9px 28px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--accent); border-color: rgba(255,165,0,0.4); }
  .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 900; }

  /* ── Pages ── */
  .page { display: none; }
  .page.active { display: block; }
  #page-display.active {
    display: block;
    overflow: hidden;
  }
  body.display-active {
    overflow: hidden;
    height: 100vh;
  }

  /* ── Display page ── */
  .display-header {
    text-align: center;
    margin-bottom: 32px;
  }
  .display-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(42px, 8vw, 78px);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 40px rgba(255,165,0,0.8), 0 0 80px rgba(255,100,0,0.4);
    letter-spacing: 4px;
    line-height: 1;
  }
  .display-title span { color: var(--accent); }
  .display-subtitle {
    margin-top: 12px;
    font-size: 22px;
    letter-spacing: 8px;
    color: var(--accent);
    text-transform: uppercase;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    text-shadow: 0 0 16px rgba(255,165,0,0.8);
  }

  .dv-row {
    display: grid;
    grid-template-columns: 64px 1fr 160px;
    align-items: center;
    gap: 16px;
    border-radius: 3px;
    padding: 13px 20px;
    margin-bottom: 6px;
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    background: var(--card);
    animation: slideIn 0.25s ease both;
  }
  .dv-row.pos-1 {
    border-left-color: var(--gold);
    background: linear-gradient(90deg, rgba(255,215,0,0.1), var(--card) 60%);
    padding: 18px 20px;
  }
  .dv-row.pos-2 {
    border-left-color: var(--silver);
    background: linear-gradient(90deg, rgba(192,192,192,0.07), var(--card) 60%);
    padding: 16px 20px;
  }
  .dv-row.pos-3 {
    border-left-color: var(--bronze);
    background: linear-gradient(90deg, rgba(205,127,50,0.07), var(--card) 60%);
    padding: 15px 20px;
  }

  .dv-rank {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    text-align: center;
  }
  .dv-row.pos-1 .dv-rank { color: var(--gold);   font-size: 28px; text-shadow: 0 0 16px rgba(255,215,0,0.9); }
  .dv-row.pos-2 .dv-rank { color: var(--silver); font-size: 24px; text-shadow: 0 0 12px rgba(192,192,192,0.7); }
  .dv-row.pos-3 .dv-rank { color: var(--bronze); font-size: 22px; text-shadow: 0 0 12px rgba(205,127,50,0.7); }
  .dv-row:not(.pos-1):not(.pos-2):not(.pos-3) .dv-rank { color: rgba(255,255,255,0.8); font-size: 28px; font-weight: 900; text-shadow: 0 0 6px rgba(255,255,255,0.2); }

  .dv-name {
    font-size: 30px;
    font-weight: 700;
    color: #fff;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dv-row.pos-1 .dv-name { font-size: 36px; }
  .dv-row.pos-2 .dv-name { font-size: 33px; }

  .dv-row .rank-title {
    font-size: 20px;
    padding: 4px 14px;
  }

  .dv-score {
    font-family: 'Orbitron', monospace;
    font-size: 27px;
    font-weight: 700;
    color: var(--accent);
    text-align: right;
  }
  .dv-row.pos-1 .dv-score { color: var(--gold);   font-size: 33px; }
  .dv-row.pos-2 .dv-score { color: var(--silver); font-size: 30px; }
  .dv-row.pos-3 .dv-score { color: var(--bronze); font-size: 27px; }

  .dv-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 10px 0 16px;
  }


  .dv-header-row {
    display: grid;
    grid-template-columns: 64px 1fr 160px;
    gap: 16px;
    padding: 10px 20px;
    margin-bottom: 8px;
    background: linear-gradient(90deg, rgba(255,165,0,0.1), transparent);
    border: 1px solid rgba(255,165,0,0.25);
    border-left: 3px solid var(--accent);
    border-radius: 3px;
  }
  .dv-header-row span {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 700;
  }
  .dv-header-row span:last-child { text-align: right; }
  .dv-header-row span:first-child { text-align: center; }

  .dv-frame {
    border: 6px solid var(--accent);
    border-radius: 6px;
    padding: 28px 24px 24px;
    box-shadow: 0 0 32px rgba(255,165,0,0.5), 0 0 80px rgba(255,100,0,0.2);
    transform-origin: top center;
  }

  .dv-empty {
    text-align: center;
    padding: 60px 20px;
    color: rgba(255,255,255,0.15);
    font-size: 13px;
    letter-spacing: 3px;
    border: 1px dashed var(--border);
    border-radius: 4px;
  }

  /* Rank pill */
  .player-info { display: flex; flex-direction: column; gap: 3px; overflow: hidden; }
  .rank-title {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 2px 8px;
    border-radius: 2px;
    white-space: nowrap;
    width: fit-content;
    text-transform: uppercase;
  }
  .rank-pill {
    border: 1px solid var(--rk-color);
    color: var(--rk-color);
    background: color-mix(in srgb, var(--rk-color) 12%, transparent);
  }
  .rank-glow { text-shadow: 0 0 8px var(--rk-color); }

  /* Ranks page */
  .ranks-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .rank-tier {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }
  .rank-tier:hover { border-color: rgba(255,165,0,0.4); }
  .rank-tier-score {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    font-weight: 700;
  }
  .ranks-section-title {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin: 18px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .ranks-section-title:first-child { margin-top: 0; }

  @media (max-width: 520px) {
    .form-row { grid-template-columns: 1fr 1fr; }
    .form-row .btn { grid-column: 1 / -1; }
    .lb-row { grid-template-columns: 40px 1fr auto; }
    .player-score { display: none; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo-tag">CASE · CREATIVE</div>
    <h1>LEADER<span>BOARD</span></h1>
    <p class="subtitle">Add · Edit · Remove — Auto-Sorted by Score</p>
  </header>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('manager')">⚙ MANAGER</button>
    <button class="tab-btn" onclick="switchTab('display')">🏆 DISPLAY</button>
    <button class="tab-btn" onclick="switchTab('ranks')">🎖 RANKS</button>
  </div>

  <div id="page-manager" class="page active">

  <div class="form-card">
    <div class="form-title">▸ Add Player</div>
    <div class="form-row">
      <div class="field">
        <label>Player Name</label>
        <input type="text" id="inp-name" placeholder="e.g. SnipeKing99" maxlength="24" autocomplete="off">
      </div>
      <div class="field">
        <label>Score</label>
        <input type="number" id="inp-score" placeholder="0" min="0">
      </div>
      <button class="btn btn-add" onclick="addPlayer()">+ ADD</button>
    </div>
  </div>

  <div class="lb-topbar">
    <span class="lb-label">▸ Standings</span>
    <div style="display:flex;gap:12px;align-items:center;">
      <span class="lb-count" id="lb-count">0 players</span>
      <button class="btn-populate" onclick="populateSample()">⚡ POPULATE</button>
      <button class="btn-reset" id="btn-reset" onclick="resetAll()">RESET ALL</button>
      <button class="btn-remove-all" id="btn-remove-all" onclick="removeAll()">REMOVE ALL</button>
    </div>
  </div>

  <div class="lb-list" id="lb-list">
    <div class="lb-empty" id="lb-empty">
      <span>🏆</span>
      NO PLAYERS YET — ADD ONE ABOVE
    </div>
  </div>

  </div><!-- end page-manager -->

  <!-- ── Display Page ── -->
  <div id="page-display" class="page">
    <div class="dv-frame">
      <div class="display-header">
        <div class="display-title">LEADER<span>BOARD</span></div>
        <div class="display-subtitle">Top Players · All Time</div>
      </div>
      <div id="dv-list"></div>
    </div>
  </div>

  <!-- ── Ranks Page ── -->
  <div id="page-ranks" class="page">
    <div class="dv-frame">
      <div class="display-header">
        <div class="display-title">RANK<span>S</span></div>
        <div class="display-subtitle">5 Score Per Kill</div>
      </div>
      <div id="ranks-list"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let entries = [];   // { id, name, score }
  let nextId = 1;

  const RANK_TIERS = [
    { min: 1000000, emoji: '🌟', name: 'Omnipotent',      color: '#F1C40F', glow: true,  group: 'Mythic' },
    { min: 750000,  emoji: '♾️', name: 'Eternal',          color: '#EBA615', glow: true,  group: 'Mythic' },
    { min: 500000,  emoji: '🌌', name: 'Celestial',        color: '#1966C8', glow: true,  group: 'Mythic' },
    { min: 250000,  emoji: '✨', name: 'Transcendent',     color: '#F8ECAC', glow: true,  group: 'Mythic' },
    { min: 100000,  emoji: '💀', name: 'Godlike',          color: '#EFB42A', glow: true,  group: 'Mythic' },
    { min: 95000,   emoji: '👑', name: 'Immortal III',     color: '#621B96', glow: true,  group: 'Immortal' },

    { min: 85000,   emoji: '👑', name: 'Immortal I',       color: '#621B96', glow: true,  group: 'Immortal' },
    { min: 80000,   emoji: '🔱', name: 'Legend III',        color: '#BB0B04', glow: true,  group: 'Legend' },
    { min: 75000,   emoji: '🔱', name: 'Legend II',         color: '#BB0B04', glow: true,  group: 'Legend' },
    { min: 70000,   emoji: '🔱', name: 'Legend I',          color: '#BB0B04', glow: true,  group: 'Legend' },
    { min: 65000,   emoji: '🟢', name: 'Ascendant III',    color: '#136C32', glow: true,  group: 'Ascendant' },
    { min: 60000,   emoji: '🟢', name: 'Ascendant II',     color: '#136C32', glow: true,  group: 'Ascendant' },
    { min: 55000,   emoji: '🟢', name: 'Ascendant I',      color: '#136C32', glow: true,  group: 'Ascendant' },
    { min: 50000,   emoji: '🚀', name: 'Unreal',           color: '#1ABC9C', glow: true,  group: 'Special' },
    { min: 40000,   emoji: '🔥', name: 'Champion',         color: '#E67E22', glow: true,  group: 'Special' },
    { min: 30000,   emoji: '⚡', name: 'Elite',            color: '#95A5A6', glow: false, group: 'Special' },
    { min: 24000,   emoji: '💎', name: 'Diamond III',      color: '#3498DB', glow: false, group: 'Diamond' },
    { min: 21000,   emoji: '💎', name: 'Diamond II',       color: '#3498DB', glow: false, group: 'Diamond' },
    { min: 18000,   emoji: '💎', name: 'Diamond I',        color: '#3498DB', glow: false, group: 'Diamond' },
    { min: 15000,   emoji: '⚙️', name: 'Platinum III',     color: '#1ABC9C', glow: false, group: 'Platinum' },
    { min: 13000,   emoji: '⚙️', name: 'Platinum II',      color: '#1ABC9C', glow: false, group: 'Platinum' },
    { min: 11000,   emoji: '⚙️', name: 'Platinum I',       color: '#1ABC9C', glow: false, group: 'Platinum' },
    { min: 9000,    emoji: '🧈', name: 'Gold III',         color: '#F1C40F', glow: false, group: 'Gold' },
    { min: 7500,    emoji: '🧈', name: 'Gold II',          color: '#F1C40F', glow: false, group: 'Gold' },
    { min: 6000,    emoji: '🧈', name: 'Gold I',           color: '#F1C40F', glow: false, group: 'Gold' },
    { min: 4500,    emoji: '🥈', name: 'Silver III',       color: '#BDC3C7', glow: false, group: 'Silver' },
    { min: 3500,    emoji: '🥈', name: 'Silver II',        color: '#BDC3C7', glow: false, group: 'Silver' },
    { min: 2500,    emoji: '🥈', name: 'Silver I',         color: '#BDC3C7', glow: false, group: 'Silver' },
    { min: 1500,    emoji: '🥉', name: 'Bronze III',       color: '#CD7F32', glow: false, group: 'Bronze' },
    { min: 1000,    emoji: '🥉', name: 'Bronze II',        color: '#CD7F32', glow: false, group: 'Bronze' },
    { min: 500,     emoji: '🥉', name: 'Bronze I',         color: '#CD7F32', glow: false, group: 'Bronze' },
  ];

  function getRank(score) {
    for (const tier of RANK_TIERS) {
      if (score >= tier.min) return tier;
    }
    return { emoji: '—', name: 'Unranked', color: '#9B59B6', glow: false };
  }

  function rankHtml(score) {
    const r = getRank(score);
    const glow = r.glow ? ' rank-glow' : '';
    return `<span class="rank-title rank-pill${glow}" style="--rk-color:${r.color}">${r.emoji} ${r.name}</span>`;
  }

  const list    = document.getElementById('lb-list');
  const empty   = document.getElementById('lb-empty');
  const counter = document.getElementById('lb-count');
  const inpName  = document.getElementById('inp-name');
  const inpScore = document.getElementById('inp-score');

  // Load saved data on startup
  loadData();
  render();

  // Allow Enter key to add
  inpName.addEventListener('keydown',  e => { if (e.key === 'Enter') addPlayer(); });
  inpScore.addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });

  function addPlayer() {
    const name  = inpName.value.trim();
    const score = parseInt(inpScore.value) || 0;
    if (!name) { showToast('ENTER A PLAYER NAME'); inpName.focus(); return; }

    const duplicate = entries.find(e => e.name.toLowerCase() === name.toLowerCase());
    if (duplicate) {
      duplicate.score = score;
      inpName.value  = '';
      inpScore.value = '';
      inpName.focus();
      render();
      showToast('SCORE UPDATED');
      return;
    }

    entries.push({ id: nextId++, name, score });
    inpName.value  = '';
    inpScore.value = '';
    inpName.focus();
    render();
    showToast('PLAYER ADDED');
  }

  function deletePlayer(id) {
    entries = entries.filter(e => e.id !== id);
    render();
    showToast('PLAYER REMOVED');
  }

  function startEdit(id) {
    const row = document.querySelector(`.lb-row[data-id="${id}"]`);
    if (!row) return;
    const entry = entries.find(e => e.id === id);
    row.classList.add('editing');

    const infoCell  = row.querySelector('.player-info');
    const scoreCell = row.querySelector('.player-score');
    const actions   = row.querySelector('.row-actions');

    infoCell.innerHTML  = `<input class="edit-name"  value="${entry.name}"  maxlength="24" autocomplete="off">`;
    scoreCell.innerHTML = `<input class="edit-score" type="number" value="${entry.score}" min="0">`;
    actions.innerHTML   = `
      <button class="btn-sm btn-save"   onclick="saveEdit(${id})">SAVE</button>
      <button class="btn-sm btn-cancel" onclick="render()">✕</button>`;

    const nameInput = row.querySelector('.edit-name');
    nameInput.focus();
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveEdit(id); });
    row.querySelector('.edit-score').addEventListener('keydown', e => { if (e.key === 'Enter') saveEdit(id); });
  }

  function saveEdit(id) {
    const row   = document.querySelector(`.lb-row[data-id="${id}"]`);
    const name  = row.querySelector('.edit-name').value.trim();
    const score = parseInt(row.querySelector('.edit-score').value) || 0;
    if (!name) { showToast('NAME CANNOT BE EMPTY'); return; }

    const duplicate = entries.find(e => e.name.toLowerCase() === name.toLowerCase() && e.id !== id);
    if (duplicate) { showToast('PLAYER ALREADY EXISTS'); return; }

    const entry = entries.find(e => e.id === id);
    entry.name  = name;
    entry.score = score;
    render();
    showToast('SAVED');
  }

  function resetAll() {
    if (entries.length === 0) return;
    const btn = document.getElementById('btn-reset');
    if (btn.dataset.confirm !== 'yes') {
      btn.textContent = 'SURE?';
      btn.style.color = 'var(--red)';
      btn.style.borderColor = 'var(--red)';
      btn.dataset.confirm = 'yes';
      setTimeout(() => {
        btn.textContent = 'RESET ALL';
        btn.style.color = '';
        btn.style.borderColor = '';
        btn.dataset.confirm = '';
      }, 2500);
      return;
    }
    btn.textContent = 'RESET ALL';
    btn.style.color = '';
    btn.style.borderColor = '';
    btn.dataset.confirm = '';
    entries.forEach(e => e.score = 0);
    render();
    showToast('ALL SCORES RESET');
  }

  function saveData() {
    localStorage.setItem('lb_entries', JSON.stringify(entries));
    localStorage.setItem('lb_nextId', nextId);
  }

  function loadData() {
    try {
      const saved = localStorage.getItem('lb_entries');
      const savedId = localStorage.getItem('lb_nextId');
      if (saved) entries = JSON.parse(saved);
      if (savedId) nextId = parseInt(savedId);
    } catch(e) {}
  }

  function render() {
    saveData();
    // Remove all existing rows (keep empty placeholder)
    list.querySelectorAll('.lb-row').forEach(r => r.remove());

    if (entries.length === 0) {
      empty.style.display = 'block';
      counter.textContent = '0 players';
      return;
    }

    empty.style.display = 'none';
    counter.textContent = `${entries.length} player${entries.length !== 1 ? 's' : ''}`;

    const sorted = [...entries].sort((a, b) => b.score - a.score);

    sorted.forEach((entry, index) => {
      const pos = index + 1;
      const posClass = pos <= 3 ? `pos-${pos}` : '';
      const medal = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : `#${pos}`;
      const scoreFormatted = entry.score.toLocaleString();

      const row = document.createElement('div');
      row.className = `lb-row ${posClass}`;
      row.dataset.id = entry.id;

      row.innerHTML = `
        <div class="rank-badge">${medal}</div>
        <div class="player-info">
          <div class="player-name">${escHtml(entry.name)}</div>
          ${rankHtml(entry.score)}
        </div>
        <div class="player-score">${scoreFormatted} pts</div>
        <div class="row-actions">
          <button class="btn-sm btn-edit" onclick="startEdit(${entry.id})">EDIT</button>
          <button class="btn-sm btn-del"  onclick="deletePlayer(${entry.id})">✕</button>
        </div>`;
      list.appendChild(row);
    });
    // Keep display page in sync so scaling is always current
    renderDisplaySilent();
  }

  function renderDisplaySilent() {
    const dvList = document.getElementById('dv-list');
    dvList.innerHTML = '';
    if (entries.length === 0) {
      dvList.innerHTML = '<div class="dv-empty">NO PLAYERS YET</div>';
      return;
    }
    dvList.innerHTML = `<div class="dv-header-row"><span>Rank</span><span>Player</span><span>Score</span></div>`;
    const sorted = [...entries].sort((a, b) => b.score - a.score).slice(0, 10);
    sorted.slice(0, 3).forEach((entry, index) => {
      const pos = index + 1;
      const medal = pos === 1 ? '🥇' : pos === 2 ? '🥈' : '🥉';
      const row = document.createElement('div');
      row.className = `dv-row pos-${pos}`;
      row.innerHTML = `<div class="dv-rank">${medal}</div><div class="player-info"><div class="dv-name">${escHtml(entry.name)}</div>${rankHtml(entry.score)}</div><div class="dv-score">${entry.score.toLocaleString()}</div>`;
      dvList.appendChild(row);
    });
    if (sorted.length > 3) {
      dvList.innerHTML += '<div class="dv-divider"></div>';
      sorted.slice(3).forEach((entry, index) => {
        const pos = index + 4;
        const row = document.createElement('div');
        row.className = 'dv-row';
        row.innerHTML = `<div class="dv-rank">#${pos}</div><div class="player-info"><div class="dv-name">${escHtml(entry.name)}</div>${rankHtml(entry.score)}</div><div class="dv-score">${entry.score.toLocaleString()}</div>`;
        dvList.appendChild(row);
      });
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  function populateSample() {
    const prefixes = ['Snipe','Shadow','Ghost','Blaze','Storm','Frost','Void','Neon','Hyper','Apex','Dark','Steel','Rogue','Swift','Iron','Chaos','Pixel','Nova','Turbo','Night','Toxic','Savage','Silent','Rapid','Lunar','Solar','Cyber','Omega','Alpha','Delta','Echo','Reaper','Phantom','Crimson'];
    const suffixes = ['King','Wolf','Blade','Fox','Eagle','Bear','Tiger','Hawk','Viper','Shark','Rider','Hunt3r','Z3ro','X','Pro','GG','Slayer','Sniper','Ghost','Storm','Flash','Ninja','Legend','Boss','God','Demon','Angel','Dragon','Phoenix','Cobra','Panther','Falcon','Lynx'];
    const used = new Set(entries.map(e => e.name.toLowerCase()));
    // One player per rank tier + one Unranked
    const sampleScores = [...RANK_TIERS.map(t => t.min), 0];
    let added = 0;
    sampleScores.forEach(score => {
      let name, attempts = 0;
      do {
        name = prefixes[Math.floor(Math.random()*prefixes.length)] + suffixes[Math.floor(Math.random()*suffixes.length)];
        attempts++;
      } while (used.has(name.toLowerCase()) && attempts < 200);
      if (used.has(name.toLowerCase())) return;
      used.add(name.toLowerCase());
      entries.push({ id: nextId++, name, score });
      added++;
    });
    render();
    showToast(`${added} PLAYERS ADDED`);
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='manager'&&i===0)||(tab==='display'&&i===1)||(tab==='ranks'&&i===2)));
    document.getElementById('page-manager').classList.toggle('active', tab === 'manager');
    document.getElementById('page-display').classList.toggle('active', tab === 'display');
    document.getElementById('page-ranks').classList.toggle('active', tab === 'ranks');
    document.body.classList.toggle('display-active', tab === 'display');
    if (tab === 'display') renderDisplay();
    if (tab === 'ranks') renderRanks();
  }

  function renderDisplay() {
    const dvList = document.getElementById('dv-list');
    dvList.innerHTML = '';
    if (entries.length === 0) {
      dvList.innerHTML = '<div class="dv-empty">NO PLAYERS YET</div>';
      return;
    }
    dvList.innerHTML = `<div class="dv-header-row"><span>Rank</span><span>Player</span><span>Score</span></div>`;
    const sorted = [...entries].sort((a, b) => b.score - a.score).slice(0, 10);
    // Top 3 big rows
    sorted.slice(0, 3).forEach((entry, index) => {
      const pos = index + 1;
      const medal = pos === 1 ? '🥇' : pos === 2 ? '🥈' : '🥉';
      const row = document.createElement('div');
      row.className = `dv-row pos-${pos}`;
      row.innerHTML = `<div class="dv-rank">${medal}</div><div class="player-info"><div class="dv-name">${escHtml(entry.name)}</div>${rankHtml(entry.score)}</div><div class="dv-score">${entry.score.toLocaleString()}</div>`;
      dvList.appendChild(row);
    });
    if (sorted.length > 3) {
      dvList.innerHTML += '<div class="dv-divider"></div>';
      sorted.slice(3).forEach((entry, index) => {
        const pos = index + 4;
        const row = document.createElement('div');
        row.className = 'dv-row';
        row.innerHTML = `<div class="dv-rank">#${pos}</div><div class="player-info"><div class="dv-name">${escHtml(entry.name)}</div>${rankHtml(entry.score)}</div><div class="dv-score">${entry.score.toLocaleString()}</div>`;
        dvList.appendChild(row);
      });
    }
    scaleDisplay();
  }

  function scaleDisplay() {
    const frame = document.querySelector('#page-display .dv-frame');
    if (!frame) return;
    // Temporarily show the page to measure if it's hidden
    const page = document.getElementById('page-display');
    const wasHidden = !page.classList.contains('active');
    if (wasHidden) { page.style.display = 'block'; page.style.visibility = 'hidden'; page.style.position = 'absolute'; }
    // Reset scale to measure natural height
    frame.style.transform = 'none';
    const wrapperTop = frame.getBoundingClientRect().top;
    const available = window.innerHeight - wrapperTop - 20;
    const natural = frame.scrollHeight;
    if (natural > available) {
      frame.style.transform = `scale(${available / natural})`;
    } else {
      frame.style.transform = 'scale(1)';
    }
    // Restore hidden state
    if (wasHidden) { page.style.display = ''; page.style.visibility = ''; page.style.position = ''; }
  }

  window.addEventListener('resize', scaleDisplay);

  // Continuously auto-scale: watch for any DOM/size changes
  const _dvFrame = document.querySelector('#page-display .dv-frame');
  if (_dvFrame) {
    new ResizeObserver(scaleDisplay).observe(_dvFrame);
    new MutationObserver(scaleDisplay).observe(_dvFrame, { childList: true, subtree: true, characterData: true });
  }

  function renderRanks() {
    const container = document.getElementById('ranks-list');
    const groups = [
      { title: 'Mythic', tiers: RANK_TIERS.filter(t => t.group === 'Mythic') },
      { title: 'Immortal', tiers: RANK_TIERS.filter(t => t.group === 'Immortal') },
      { title: 'Legend', tiers: RANK_TIERS.filter(t => t.group === 'Legend') },
      { title: 'Ascendant', tiers: RANK_TIERS.filter(t => t.group === 'Ascendant') },
      { title: 'Special', tiers: RANK_TIERS.filter(t => t.group === 'Special') },
      { title: 'Diamond', tiers: RANK_TIERS.filter(t => t.group === 'Diamond') },
      { title: 'Platinum', tiers: RANK_TIERS.filter(t => t.group === 'Platinum') },
      { title: 'Gold', tiers: RANK_TIERS.filter(t => t.group === 'Gold') },
      { title: 'Silver', tiers: RANK_TIERS.filter(t => t.group === 'Silver') },
      { title: 'Bronze', tiers: RANK_TIERS.filter(t => t.group === 'Bronze') },
    ];
    let html = '';
    groups.forEach(g => {
      html += `<div class="ranks-section-title">${g.title}</div><div class="ranks-grid">`;
      g.tiers.forEach(t => {
        const glow = t.glow ? ' rank-glow' : '';
        html += `<div class="rank-tier"><span class="rank-title rank-pill${glow}" style="--rk-color:${t.color};font-size:11px;padding:3px 10px;">${t.emoji} ${t.name}</span><span class="rank-tier-score" style="color:${t.color}">${t.min.toLocaleString()}+ pts</span></div>`;
      });
      html += '</div>';
    });
    container.innerHTML = html;
  }

  function removeAll() {
    if (entries.length === 0) return;
    const btn = document.getElementById('btn-remove-all');
    if (btn.dataset.confirm !== 'yes') {
      btn.textContent = 'SURE?';
      btn.style.color = 'var(--red)';
      btn.style.borderColor = 'var(--red)';
      btn.dataset.confirm = 'yes';
      setTimeout(() => {
        btn.textContent = 'REMOVE ALL';
        btn.style.color = '';
        btn.style.borderColor = '';
        btn.dataset.confirm = '';
      }, 2500);
      return;
    }
    btn.textContent = 'REMOVE ALL';
    btn.style.color = '';
    btn.style.borderColor = '';
    btn.dataset.confirm = '';
    entries = [];
    nextId = 1;
    render();
    showToast('ALL PLAYERS REMOVED');
  }

</script>
