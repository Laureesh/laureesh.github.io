<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="Laureesh Blog Feed"
      href="/rss.xml"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Laureesh Volmar's Portfolio Website" />
    <title>Laureesh Volmar | Portfolio</title>
    <script>
      const redirectParams = new URLSearchParams(window.location.search);
      const redirectedPath = redirectParams.get("p");

      if (redirectedPath) {
        const redirectedQuery = redirectParams.get("q");
        const redirectedHash = redirectParams.get("h");
        const nextUrl = `${redirectedPath}${redirectedQuery ? `?${redirectedQuery}` : ""}${
          redirectedHash ? `#${redirectedHash}` : ""
        }`;

        window.history.replaceState(null, "", nextUrl);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
